<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Optical Pixel File Transfer</title>
<style>
body { background:#111; color:white; font-family:monospace; text-align:center; }
canvas, video { border:2px solid white; margin-top:20px; }
#output { margin-top:20px; word-break:break-all; white-space:pre-wrap; max-width:90%; margin:auto; }
button,input { margin:5px; padding:5px; }
</style>
</head>
<body>

<h1>Optical Pixel File Transfer</h1>

<input type="file" id="fileInput">
<button id="startTxBtn">Iniciar transmisión</button>
<button id="stopTxBtn">Parar transmisión</button>
<br><br>
<canvas id="txCanvas" width="400" height="400"></canvas>

<hr>

<button id="startRxBtn">Abrir cámara receptor</button>
<video id="video" width="400" height="300" autoplay></video>
<div id="output"></div>

<script>
// ======== CONFIGURACIÓN ========
const BLOCK_SIZE = 20; // tamaño de cada bloque de color en px
const BLOCKS_PER_ROW = 20; // número de bloques por fila
const COLORS = [
    [255,0,0],   // rojo = 00
    [0,255,0],   // verde = 01
    [0,0,255],   // azul = 10
    [255,255,0]  // amarillo = 11
];

let encodedData = [];
let txInterval = null;
let txIndex = 0;
let fileName = "";

// ======== TRANSMISIÓN ========
const txCanvas = document.getElementById('txCanvas');
const txCtx = txCanvas.getContext('2d');

document.getElementById('startTxBtn').onclick = () => {
    const file = document.getElementById('fileInput').files[0];
    if(!file){ alert("Selecciona un archivo"); return; }
    fileName = file.name;
    const reader = new FileReader();
    reader.onload = () => {
        const bytes = new Uint8Array(reader.result);
        encodedData = [];
        for(let b of bytes){
            // Convertir cada byte en 2 colores (4 bits por color)
            let high = (b >> 4) & 0xF;
            let low = b & 0xF;
            encodedData.push(COLORS[high%4]);
            encodedData.push(COLORS[low%4]);
        }
        txIndex = 0;
        txInterval = setInterval(drawNextFrame, 100);
    };
    reader.readAsArrayBuffer(file);
};

document.getElementById('stopTxBtn').onclick = () => {
    clearInterval(txInterval);
};

function drawNextFrame(){
    txCtx.fillStyle = "black";
    txCtx.fillRect(0,0,txCanvas.width,txCanvas.height);

    let row = 0, col = 0;
    for(let i=txIndex; i<encodedData.length && row<BLOCKS_PER_ROW; i++){
        const color = encodedData[i];
        txCtx.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`;
        txCtx.fillRect(col*BLOCK_SIZE,row*BLOCK_SIZE,BLOCK_SIZE,BLOCK_SIZE);
        col++;
        if(col>=BLOCKS_PER_ROW){ col=0; row++; }
    }

    txIndex += BLOCKS_PER_ROW*BLOCKS_PER_ROW;
    if(txIndex >= encodedData.length) txIndex = 0;
}

// ======== RECEPCIÓN ========
let rxChunks = [];
let receiving = false;

document.getElementById('startRxBtn').onclick = async () => {
    const video = document.getElementById('video');
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    function capture(){
        if(video.videoWidth===0 || receiving){ requestAnimationFrame(capture); return; }
        receiving = true;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video,0,0);
        const frame = ctx.getImageData(0,0,canvas.width,canvas.height);
        const chunk = decodeFrame(frame);
        if(chunk.length>0){
            rxChunks.push(...chunk);
            document.getElementById('output').innerText = `Recibiendo ${rxChunks.length} bytes...`;
        }
        receiving = false;
        requestAnimationFrame(capture);
    }

    capture();
};

function decodeFrame(frame){
    const data = frame.data;
    let bytes = [];
    const pixelsPerBlock = BLOCK_SIZE*BLOCK_SIZE;
    for(let i=0; i<data.length; i+=4*BLOCK_SIZE){
        const r = data[i], g=data[i+1], b=data[i+2];
        // Decodificación simplificada: encuentra el color más cercano
        let minDist=1e9, idx=0;
        for(let c=0;c<COLORS.length;c++){
            const d = (r-COLORS[c][0])**2 + (g-COLORS[c][1])**2 + (b-COLORS[c][2])**2;
            if(d<minDist){ minDist=d; idx=c; }
        }
        bytes.push(idx);
    }
    // Convertir de colores a bytes reales
    let out = [];
    for(let i=0;i<bytes.length;i+=2){
        const b = ((bytes[i]&0x3)<<4)|((bytes[i+1]&0x3));
        out.push(b);
    }
    return out;
}

// ======== RECONSTRUCCIÓN ========
function reconstructFile(){
    const arr = new Uint8Array(rxChunks);
    const blob = new Blob([arr]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName || 'archivo_recibido';
    a.innerText = 'Descargar archivo recibido';
    document.getElementById('output').appendChild(document.createElement('br'));
    document.getElementById('output').appendChild(a);
}
</script>

</body>
</html>
