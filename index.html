<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Optical Pixel File Transfer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { background:#111; color:white; font-family:monospace; text-align:center; margin:0; }
canvas, video { border:2px solid white; margin-top:20px; max-width:90vw; height:auto; }
#output { margin-top:20px; word-break:break-all; white-space:pre-wrap; max-width:90%; margin:auto; }
button,input { margin:5px; padding:10px; font-size:16px; }
</style>
</head>
<body>

<h1>Optical Pixel File Transfer</h1>

<input type="file" id="fileInput">
<button id="startTxBtn">Iniciar transmisión</button>
<button id="stopTxBtn">Parar transmisión</button>
<br><br>
<canvas id="txCanvas" width="400" height="400"></canvas>

<hr>

<button id="startRxBtn">Abrir cámara receptor</button>
<video id="video" width="400" height="300" autoplay></video>
<div id="output"></div>

<script>
// ======== CONFIGURACIÓN ========
const BLOCK_SIZE = 30; // tamaño de bloque grande
const ROWS = 10;
const COLS = 10;
const COLORS = [
    [255,0,0],   // rojo = 00
    [0,255,0],   // verde = 01
    [0,0,255],   // azul = 10
    [255,255,0]  // amarillo = 11
];
const END_MARKER = [128,128,128]; // gris = fin de transmisión

let encodedData = [];
let txInterval = null;
let txIndex = 0;
let fileName = "";

// ======== TRANSMISIÓN ========
const txCanvas = document.getElementById('txCanvas');
const txCtx = txCanvas.getContext('2d');

document.getElementById('startTxBtn').onclick = () => {
    const file = document.getElementById('fileInput').files[0];
    if(!file){ alert("Selecciona un archivo"); return; }
    fileName = file.name;
    const reader = new FileReader();
    reader.onload = () => {
        const bytes = new Uint8Array(reader.result);
        encodedData = [];
        for(let b of bytes){
            let high = (b >> 4) & 0xF;
            let low = b & 0xF;
            encodedData.push(COLORS[high%4]);
            encodedData.push(COLORS[low%4]);
        }
        encodedData.push(END_MARKER); // marcador de fin
        txIndex = 0;
        document.getElementById('output').innerText = "Comenzando transmisión en 5 segundos...";
        setTimeout(()=>{ txInterval = setInterval(drawNextFrame, 150); },5000);
    };
    reader.readAsArrayBuffer(file);
};

document.getElementById('stopTxBtn').onclick = () => {
    clearInterval(txInterval);
};

function drawNextFrame(){
    txCtx.fillStyle = "black";
    txCtx.fillRect(0,0,txCanvas.width,txCanvas.height);
    let row=0, col=0;
    for(let i=txIndex; i<encodedData.length && row<ROWS; i++){
        const color = encodedData[i];
        txCtx.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`;
        txCtx.fillRect(col*BLOCK_SIZE,row*BLOCK_SIZE,BLOCK_SIZE,BLOCK_SIZE);
        col++;
        if(col>=COLS){ col=0; row++; }
    }
    txIndex += ROWS*COLS;
    if(txIndex >= encodedData.length) txIndex = 0;
}

// ======== RECEPCIÓN ========
let rxBytes = [];
let receiving = false;
let finished = false;

document.getElementById('startRxBtn').onclick = async () => {
    finished = false;
    rxBytes = [];
    const video = document.getElementById('video');
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    function capture(){
        if(video.videoWidth===0 || receiving || finished){ requestAnimationFrame(capture); return; }
        receiving = true;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video,0,0);
        const frame = ctx.getImageData(0,0,canvas.width,canvas.height);
        const chunk = decodeFrame(frame);
        if(chunk.length>0){
            for(let b of chunk){
                if(b===255){ // fin de transmisión
                    finished=true;
                    reconstructFile();
                    break;
                }else{
                    rxBytes.push(b);
                }
            }
            document.getElementById('output').innerText = `Recibiendo ${rxBytes.length} bytes...`;
        }
        receiving=false;
        requestAnimationFrame(capture);
    }
    capture();
};

function decodeFrame(frame){
    const data = frame.data;
    const blocks = [];
    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
            const px = (y*COLS + x)*BLOCK_SIZE*4;
            const r = data[px], g=data[px+1], b=data[px+2];
            if(r===128 && g===128 && b===128){ blocks.push(255); continue; } // fin
            // encuentra color más cercano
            let minDist=1e9, idx=0;
            for(let c=0;c<COLORS.length;c++){
                const d = (r-COLORS[c][0])**2 + (g-COLORS[c][1])**2 + (b-COLORS[c][2])**2;
                if(d<minDist){ minDist=d; idx=c; }
            }
            blocks.push(idx);
        }
    }
    // reconstruir bytes de colores
    let out = [];
    for(let i=0;i<blocks.length;i+=2){
        const b = ((blocks[i]&0x3)<<4)|((blocks[i+1]&0x3));
        out.push(b);
    }
    return out;
}

// ======== RECONSTRUCCIÓN ========
function reconstructFile(){
    const arr = new Uint8Array(rxBytes);
    const blob = new Blob([arr]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName || 'archivo_recibido';
    a.innerText = 'Archivo recibido - Descargar';
    document.getElementById('output').appendChild(document.createElement('br'));
    document.getElementById('output').appendChild(a);
}
</script>

</body>
</html>
